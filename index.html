<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud-Code · Sign in</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">CLOUD-CODE</div>
      <h1>Sign in<span class="dot">.</span></h1>
      <form id="login-form">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password">
        <div id="login-error"></div>
        <button type="submit" class="primary">Sign in</button>
      </form>

      <div class="login-extra-links">
        <a href="#" id="reset-password-link">Forgot password?</a>
      </div>

      <div class="login-divider"><span>or</span></div>

      <button type="button" class="ghost" id="email-link-btn" style="width:100%;">
        Email me a sign-in link
      </button>
      <div id="email-link-status" class="login-hint"></div>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
